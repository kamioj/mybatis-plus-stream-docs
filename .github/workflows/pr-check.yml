name: PR Build Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build VitePress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run docs:build
